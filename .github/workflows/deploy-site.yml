# Deploys apps/site to Cloudflare Pages.
#
# One-time setup:
#   1. On Cloudflare, create a Pages project named `excellent-react-spreadsheet`
#      (or change PROJECT_NAME below).
#      - When asked, pick "Direct Upload" — we push the built dist ourselves.
#   2. Create an API token with scope "Cloudflare Pages:Edit" + "Account:Read".
#   3. On GitHub → Settings → Secrets and variables → Actions, add:
#        CLOUDFLARE_API_TOKEN   = <the token>
#        CLOUDFLARE_ACCOUNT_ID  = <your Cloudflare account id>
#
# After that, each push to main triggers a production deploy, and each PR
# gets a preview deploy URL posted as a check status.

name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'packages/core/**'
      - 'packages/tailwind/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-site.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'packages/core/**'
      - 'packages/tailwind/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_NAME: excellent-react-spreadsheet

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (and workspace dependencies)
        run: pnpm site:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >
            pages deploy apps/site/.vitepress/dist
            --project-name=${{ env.PROJECT_NAME }}
            --branch=${{ github.head_ref || github.ref_name }}
